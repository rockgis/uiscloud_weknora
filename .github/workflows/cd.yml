name: CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  packages: write
  contents: read

jobs:
  build-ui:
    name: Build UI Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/weknora-ui

      - name: Build and push UI image
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          file: frontend/Dockerfile
          context: ./frontend
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/weknora-ui:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/weknora-ui:buildcache,mode=max

  build-docreader:
    name: Build Docreader Image
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/weknora-docreader

      - name: Build and push docreader image
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          file: docker/Dockerfile.docreader
          context: .
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/weknora-docreader:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/weknora-docreader:buildcache,mode=max

  build-app:
    name: Build App Image (${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runs: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runs: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        id: setup-buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/weknora-app

      - name: Prepare version info
        id: version
        run: |
          eval "$(./scripts/get_version.sh env)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit_id=$COMMIT_ID" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "go_version=$GO_VERSION" >> $GITHUB_OUTPUT

          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
          ./scripts/get_version.sh info

      - name: Build and push app image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          platforms: ${{ matrix.platform }}
          file: docker/Dockerfile.app
          context: .
          build-args: |
            VERSION_ARG=${{ steps.version.outputs.version }}
            COMMIT_ID_ARG=${{ steps.version.outputs.commit_id }}
            BUILD_TIME_ARG=${{ steps.version.outputs.build_time }}
            GO_VERSION_ARG=${{ steps.version.outputs.go_version }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/weknora-app:buildcache-${{ matrix.arch }}
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/weknora-app:buildcache-${{ matrix.arch }},mode=max
          outputs: type=image,push-by-digest=true,name=ghcr.io/${{ github.repository_owner }}/weknora-app,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge App Multi-arch Manifest
    runs-on: ubuntu-latest
    needs:
      - build-app
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/weknora-app

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository_owner }}/weknora-app@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository_owner }}/weknora-app:${{ steps.meta.outputs.version }}

  release:
    name: Create GitHub Release
    needs: [build-ui, build-docreader, merge]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Prepare release artifacts
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          mkdir -p /tmp/release-assets

          # docker-compose.yml: :latest → :<version> 으로 고정 (재현 가능한 배포)
          sed \
            -e "/weknora-ui/s|:latest|:${VERSION}|" \
            -e "/weknora-app/s|:latest|:${VERSION}|" \
            -e "/weknora-docreader/s|:latest|:${VERSION}|" \
            docker-compose.yml > /tmp/release-assets/docker-compose.yml

          cp .env.example /tmp/release-assets/.env.example

          # install.sh: __VERSION__ 플레이스홀더를 실제 버전으로 치환
          sed "s|__VERSION__|${VERSION}|g" scripts/install.sh > /tmp/release-assets/install.sh
          chmod +x /tmp/release-assets/install.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            /tmp/release-assets/docker-compose.yml
            /tmp/release-assets/.env.example
            /tmp/release-assets/install.sh
