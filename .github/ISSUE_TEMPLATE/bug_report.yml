name: 🐛 버그 신고
description: 버그 또는 문제를 신고합니다
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        버그 신고 감사합니다! 문제를 빠르게 찾고 해결하기 위해 아래 정보를 작성해주세요.

  - type: dropdown
    id: component
    attributes:
      label: 관련 컴포넌트
      description: 문제가 발생한 컴포넌트를 선택해주세요
      options:
        - 프론트엔드
        - 백엔드 서비스 및 API
        - 문서 파싱 서비스
        - 벡터 데이터베이스
        - 모델 서비스
        - 기타
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 버그 설명
      description: 발생한 문제를 상세하게 설명해주세요
      placeholder: "버그의 구체적인 증상을 설명해주세요..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 올바른 동작이 어떻게 되어야 하는지 설명해주세요
      placeholder: "어떤 일이 발생해야 하나요..."
    validations:
      required: true


  - type: markdown
    attributes:
      value: |
        ## 📋 로그 수집 가이드

        아래 단계에 따라 관련 로그를 수집해주세요:

        docker compose logs -f --tail=1000 app docreader postgres

        문제를 재현하고 관련 로그를 수집한 후 아래 로그 필드에 붙여넣어 주세요.

  - type: textarea
    id: logs
    attributes:
      label: 관련 로그
      description: 위 가이드에 따라 수집한 로그를 붙여넣어 주세요
      placeholder: |
        아래 명령어로 수집한 로그를 붙여넣어 주세요:
        docker compose logs -f --tail=1000 app docreader postgres
      render: shell

  - type: input
    id: os
    attributes:
      label: 운영 체제
      description: 현재 사용 중인 운영 체제
      placeholder: "예: macOS 13.0, Ubuntu 20.04, Windows 11"
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: 확인 사항
      description: 다음 사항을 확인해주세요
      options:
        - label: 기존 이슈를 검색하여 새로운 문제임을 확인했습니다
          required: true
