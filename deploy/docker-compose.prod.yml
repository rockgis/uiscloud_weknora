# WeKnora 프로덕션 환경 오버라이드
#
# 사용법 (weknora.sh가 자동 감지하여 적용):
#   deploy/ 디렉토리에 이 파일이 있으면 weknora.sh가 자동으로 적용합니다.
#
# 수동 사용:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:

  app:
    environment:
      - GIN_MODE=release
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  frontend:
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  docreader:
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  postgres:
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  redis:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
