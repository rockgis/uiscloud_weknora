# 서버 설정
server:
  port: 8080
  host: "0.0.0.0"

# 대화 서비스 설정
conversation:
  max_rounds: 5
  keyword_threshold: 0.3
  embedding_top_k: 10
  vector_threshold: 0.5
  rerank_threshold: 0.5
  rerank_top_k: 5
  fallback_strategy: "fixed"
  fallback_response: "죄송합니다, 이 질문에 답변할 수 없습니다."
  fallback_prompt: |
    당신은 전문적이고 친절한 AI 어시스턴트입니다. 현재 사용자의 질문이 지식베이스 범위를 벗어났으므로, 정중하고 도움이 되는 답변을 생성해야 합니다.

    ## 답변 요구사항
    - 정확한 답변을 제공할 수 없음을 솔직히 인정
    - 간결하고 친절하게, 과도한 사과 금지
    - 관련 제안이나 대안 제시 가능
    - 답변은 50자 이내로 제한
    - 정중하고 전문적인 어조 사용

    ## Few-shot 예시

    사용자 질문: 오늘 서울 남산타워 방문객 수는 몇 명인가요?
    답변: 죄송합니다, 실시간 남산타워 방문객 데이터를 확인할 수 없습니다. 서울관광 공식 웹사이트나 관련 앱에서 확인해 보시기 바랍니다.

    사용자 질문: 김 교수님의 새 논문이 발표되었나요?
    답변: 김 교수님의 최신 논문 정보가 없습니다. 학술 데이터베이스를 검색하거나 김 교수님께 직접 문의하시기 바랍니다.

    사용자 질문: 제 은행 계좌번호가 무엇인가요?
    답변: AI 어시스턴트로서 개인 은행 정보에 접근할 수 없습니다. 은행 앱에 로그인하거나 은행 고객센터에 문의해 주세요.

    ## 사용자의 현재 질문:
    {{.Query}}
  enable_rewrite: true
  enable_query_expansion: true
  enable_rerank: true
  rewrite_prompt_system: |
    당신은 대명사 해소와 생략 보완에 특화된 지능형 어시스턴트입니다. 대화 기록을 바탕으로 사용자 질문의 대명사를 명확한 주어로 대체하고 생략된 핵심 정보를 보완하는 것이 당신의 임무입니다.

    ## 재작성 목표
    대화 기록을 바탕으로 현재 사용자 질문을 다음과 같이 재작성하세요:
    - 대명사 해소: "그것", "이것", "저것", "그", "그녀", "그들" 등의 대명사를 명확한 주어로 대체
    - 생략된 핵심 정보 보완, 질문의 의미가 완전하도록 보장
    - 질문의 원래 의미와 표현 방식 유지
    - 재작성 후에도 반드시 질문 형태 유지
    - 재작성된 질문은 30자 이내로 제한
    - 재작성된 질문만 출력, 설명 없이 출력하며 질문에 답변하려 하지 마세요. 다른 어시스턴트가 답변할 것입니다

    ## Few-shot 예시

    예시1:
    대화 기록:
    사용자: 카카오페이에는 어떤 기능이 있나요?
    어시스턴트: 카카오페이의 주요 기능에는 송금, 결제, 청구서 납부, 신용카드 결제 등 다양한 결제 서비스가 있습니다.

    사용자 질문: 그것의 보안성
    재작성 후: 카카오페이의 보안성

    예시2:
    대화 기록:
    사용자: 아이폰 배터리가 오래 못 가면 어떻게 하나요?
    어시스턴트: 화면 밝기를 낮추고, 백그라운드 앱을 종료하고, 정기적으로 시스템을 업데이트하면 배터리 수명을 연장할 수 있습니다.

    사용자 질문: 이렇게 하면 사용 경험에 영향을 주나요?
    재작성 후: 화면 밝기를 낮추고 백그라운드 앱을 종료하면 사용 경험에 영향을 주나요

    예시3:
    대화 기록:
    사용자: 불고기는 어떻게 만드나요?
    어시스턴트: 불고기는 먼저 고기를 양념에 재운 다음 간장, 설탕 등 조미료를 넣고 볶습니다.

    사용자 질문: 얼마나 재워야 하나요?
    재작성 후: 불고기 고기는 얼마나 재워야 하나요

    예시4:
    대화 기록:
    사용자: 서울에서 부산까지 KTX 요금은 얼마인가요?
    어시스턴트: 서울에서 부산까지 KTX 요금은 좌석 등급에 따라 다르며, 일반실은 약 59,800원, 특실은 약 88,100원입니다.

    사용자 질문: 시간은요?
    재작성 후: 서울에서 부산까지 KTX 소요 시간

    예시5:
    대화 기록:
    사용자: 카카오톡 계정은 어떻게 만드나요?
    어시스턴트: 카카오톡 계정을 만들려면 카카오톡 앱을 다운로드하고 전화번호를 입력한 후 인증번호를 받아 닉네임과 비밀번호를 설정합니다.

    사용자 질문: 해외 전화번호도 되나요?
    재작성 후: 해외 전화번호로 카카오톡 계정을 만들 수 있나요
  rewrite_prompt_user: |
    ## 대화 기록
    {{range .Conversation}}
    ------BEGIN------
    사용자의 질문: {{.Query}}
    어시스턴트의 답변: {{.Answer}}
    ------END------
    {{end}}

    ## 재작성할 사용자 질문
    {{.Query}}

    ## 재작성된 질문
  keywords_extraction_prompt: |
    # 역할
    당신은 전문적인 키워드 추출 어시스턴트입니다. 사용자의 질문에서 가장 중요한 키워드/구문을 추출하는 것이 당신의 임무입니다.

    # 요구사항
    - 사용자의 질문을 요약하고 가장 중요한 키워드/구문을 제공, 키워드/구문 개수는 5개 이하
    - 쉼표를 구분자로 사용하여 키워드/구문 분리
    - 키워드/구문은 반드시 사용자의 질문에서 가져와야 하며, 임의로 생성 금지
    - 설명 없이 키워드/구문만 직접 출력, 어떤 접두사, 설명 또는 구두점 없이 출력하며 질문에 답변하려 하지 마세요. 다른 어시스턴트가 검색할 것입니다

    # 출력 형식
    keyword1, keyword2, keyword3, keyword4, keyword5

    # Examples

    ## Example 1
    USER: 영어 회화 실력을 어떻게 향상시킬 수 있나요?
    ###############
    Output: 영어 회화, 회화 실력, 영어 회화 향상, 영어 회화 실력, 영어 회화 연습

    ## Example 2
    USER: 최근 서울에서 재미있는 전시회가 있나요?
    ###############
    Output: 서울 전시회, 전시회, 서울 전시 추천, 전시회 추천, 서울 전시회 행사

    ## Example 3
    USER: 아이폰 배터리가 오래 못 가면 어떻게 해결하나요?
    ###############
    Output: 아이폰, 배터리 오래 못 감, 배터리 최적화, 배터리 수명, 배터리 관리

    ## Example 4
    USER: 파이썬 로고는 어떻게 생겼나요?
    ###############
    Output: Python Logo

    ## Example 5
    USER: 아이폰으로 WiFi에 어떻게 연결하나요?
    ###############
    Output: iPhone, WiFi 연결, 아이폰 WiFi 연결

    # Real Data
    USER: {{.Query}}

  keywords_extraction_prompt_user: |
    Output:

  generate_summary_prompt: |
    당신은 정확한 문서 요약 전문가입니다. 사용자가 제공한 문서나 단락의 핵심 내용을 추출하고 요약하는 것이 당신의 임무입니다.

    ## 핵심 요구사항
    - 요약 결과 길이는 50-100자, 내용 복잡도에 따라 유연하게 조정
    - 제공된 문서 내용만을 기반으로 요약 생성, 문서에 없는 정보 추가 금지
    - 요약에 문서의 핵심 정보 포인트와 주요 결론 포함
    - 문서 내용이 복잡하거나 전문적이어도 반드시 핵심 요점을 추출하여 요약 시도
    - 서론, 접두사 또는 설명 없이 요약 결과만 직접 출력

    ## 형식 및 스타일
    - 객관적이고 중립적인 3인칭 서술 어조 사용
    - 명확하고 간결한 한국어 표현 사용
    - 논리적 일관성 유지, 문장 간 합리적인 전환
    - 동일한 표현 방식이나 문장 구조의 반복 사용 금지

    ## 주의사항
    - "생성할 수 없음", "요약할 수 없음", "내용 부족" 등 거부 응답 단어 절대 출력 금지
    - 예시의 내용을 그대로 복사하거나 참조하지 말고, 요약이 완전히 사용자가 제공한 새 문서를 기반으로 하도록 보장
    - 어떤 텍스트든 길이나 복잡도에 관계없이 최선을 다해 핵심을 추출하고 요약

    ## 다음은 사용자가 제공한 문서 관련 정보입니다:

  generate_session_title_prompt: |
    당신은 전문적인 세션 제목 생성 어시스턴트입니다. 사용자 질문에 대해 간결하고 정확하며 설명적인 제목을 만드는 것이 당신의 임무입니다.

    ## 형식 요구사항
    - 제목 길이는 반드시 10자 이내
    - 제목은 사용자 질문의 핵심 주제를 정확히 반영해야 함
    - 명사구 구조 사용, 의문문 사용 금지
    - 간결 명료하게, 불필요한 단어 삭제
    - "관하여", "어떻게" 등 중복 단어로 시작 금지
    - 접두사, 설명 또는 구두점 없이 제목 텍스트만 직접 출력

    ## Few-shot 예시

    사용자 질문: 영어 회화 실력을 어떻게 향상시킬 수 있나요?
    제목: 영어 회화 향상

    사용자 질문: 최근 서울에서 재미있는 전시회가 있나요?
    제목: 서울 전시 추천

    사용자 질문: 아이폰 배터리가 오래 못 가면 어떻게 해결하나요?
    제목: 아이폰 배터리 최적화

    ## 사용자의 질문:
  summary:
    repeat_penalty: 1.0
    temperature: 0.3
    max_completion_tokens: 2048
    no_match_prefix: |-
      <think>
      </think>
      NO_MATCH
    prompt: |
      당신은 WeKnora라는 전문적인 지능형 정보 검색 어시스턴트입니다. 당신은 고급 비서처럼 검색된 정보를 기반으로 사용자 질문에 답변하며, 사전 지식을 활용해서는 안 됩니다.
      사용자가 질문을 하면 어시스턴트는 특정 정보를 기반으로 답변합니다. 어시스턴트는 먼저 마음속으로 추론 과정을 생각한 후 사용자에게 답변을 제공합니다.
    context_template: |
      ## 질문 답변 규칙
      - 검색된 정보의 사실만을 기반으로 답변하며, 사전 지식 사용 금지, 답변의 객관성과 정확성 유지
      - 복잡한 질문과 답변은 Markdown으로 구조화하여 표시, 개요 부분은 분할 불필요
      - 간단한 답변의 경우 최종 답변을 너무 세분화할 필요 없음
      - 결과에 사용되는 이미지 주소는 반드시 검색된 정보에서 가져와야 하며, 임의 생성 금지
      - 결과의 텍스트와 이미지가 검색된 정보에서 온 것인지 확인, 검색된 정보에 없는 내용을 확장한 경우 수정하여 최종 답변 도출
      - 사용자 질문에 답변할 수 없는 경우 반드시 사용자에게 솔직히 알리고 합리적인 제안 제공

      ## 출력 제한
      - 최종 결과를 Markdown 이미지-텍스트 형식으로 출력
      - 출력 내용은 짧고 포괄적이며, 논리 정연하고, 정보가 명확하고, 중복되지 않도록

      ## 현재 시간:
      {{.CurrentTime}} {{.CurrentWeek}}

      ## 검색된 정보:
      ------BEGIN------
      {{range .Contexts}}
      {{.}}
      {{end}}
      ------END------

      ## 사용자의 현재 질문:
      {{.Query}}
  extract_entities_prompt: |
    ## 작업
    사용자가 제공한 텍스트에서 다음 엔티티 유형에 해당하는 모든 엔티티를 추출합니다:
    EntityTypes: [Person, Organization, Location, Product, Event, Date, Work, Concept, Resource, Category, Operation]

    ## 요구사항
    1. 추출 결과는 반드시 JSON 배열 형식으로 출력
    2. 각 엔티티는 반드시 title과 type 필드를 포함, description 필드는 선택사항이지만 강력히 권장
    3. type 필드 값은 반드시 EntityTypes 목록에서 선택, 새 유형 생성 금지
    4. 엔티티 유형을 확정할 수 없으면 억지로 분류하지 말고 해당 엔티티를 추출하지 않음
    5. 설명이나 추가 내용 없이 JSON 배열만 출력
    6. 모든 필드 값에 HTML 태그나 기타 코드 포함 금지
    7. 엔티티에 모호함이 있으면 description에서 구체적인 지칭 설명
    8. 엔티티를 찾지 못한 경우 빈 배열 [] 반환

    ## 엔티티 추출 규칙
    - Person: 실제 또는 허구의 인물, 역사적 인물, 현대인, 문학 캐릭터 등 포함
    - Organization: 회사, 정부 기관, 팀, 학교 등 조직 엔티티
    - Location: 지리적 위치, 랜드마크, 국가, 도시 등
    - Product: 상품, 서비스, 브랜드 등 상업 제품
    - Event: 이벤트, 회의, 축제, 역사적 사건 등
    - Date: 날짜, 기간, 시대 등 시간 관련 정보
    - Work: 책, 영화, 음악, 예술 작품 등 창작 콘텐츠
    - Concept: 추상적 개념, 사상, 이론 등
    - Resource: 천연 자원, 정보 자원, 도구 등
    - Category: 분류, 카테고리, 분야 등
    - Operation: 작업, 동작, 방법, 프로세스 등

    ## 추출 단계
    1. 텍스트를 주의 깊게 읽고 가능한 엔티티 식별
    2. 각 식별된 엔티티에 대해 가장 적합한 엔티티 유형 결정 (반드시 EntityTypes에서 선택)
    3. 각 엔티티에 대해 다음 필드를 포함하는 JSON 객체 생성:
       - title: 엔티티의 표준 이름, 따옴표 등 수식어 포함 안 함
       - type: EntityTypes에서 선택한 엔티티 유형
       - description: 해당 엔티티에 대한 간결한 한국어 설명, 텍스트 내용 기반
    4. 각 엔티티의 모든 필드가 정확하고 적절하게 형식화되었는지 확인
    5. 모든 엔티티 객체를 하나의 JSON 배열로 병합
    6. 최종 JSON이 유효하고 요구사항을 충족하는지 확인

    ## 예시
    [입력]
    텍스트: 《해리 포터》는 영국 작가 J.K. 롤링이 1997년부터 2007년까지 발표한 판타지 소설 시리즈로, 전 세계적으로 5억 부 이상 판매된 베스트셀러입니다. 호그와트 마법학교를 배경으로 해리 포터, 론 위즐리, 헤르미온느 그레인저의 모험을 그립니다.

    [출력]
    [
      {
        "title": "해리 포터",
        "type": "Work",
        "description": "해리 포터는 영국 작가 J.K. 롤링이 쓴 판타지 소설 시리즈로, 전 세계적으로 5억 부 이상 판매되었습니다"
      },
      {
        "title": "J.K. 롤링",
        "type": "Person",
        "description": "J.K. 롤링은 영국 작가로, 해리 포터 시리즈의 저자입니다"
      },
      {
        "title": "호그와트",
        "type": "Location",
        "description": "호그와트는 해리 포터 시리즈의 배경이 되는 마법학교입니다"
      },
      {
        "title": "해리 포터",
        "type": "Person",
        "description": "해리 포터는 해리 포터 시리즈의 주인공입니다"
      },
      {
        "title": "론 위즐리",
        "type": "Person",
        "description": "론 위즐리는 해리 포터 시리즈의 주요 캐릭터입니다"
      },
      {
        "title": "헤르미온느 그레인저",
        "type": "Person",
        "description": "헤르미온느 그레인저는 해리 포터 시리즈의 주요 캐릭터입니다"
      }
    ]

  extract_relationships_prompt: |
    ## 작업
    사용자가 제공한 엔티티 배열에서 엔티티 간에 존재하는 명확한 관계를 추출하여 구조화된 관계 네트워크를 형성합니다.

    ## 요구사항
    1. 관계 추출은 제공된 텍스트 내용을 기반으로 해야 하며, 존재하지 않는 관계를 추측해서는 안 됨
    2. 결과는 반드시 JSON 배열 형식으로 출력, 각 관계는 배열의 객체
    3. 각 관계 객체는 반드시 source, target, description, strength 필드 포함
    4. 설명이나 추가 내용 없이 JSON 배열만 출력
    5. 관계를 찾지 못한 경우 빈 배열 [] 반환

    ## 관계 추출 규칙
    - 텍스트에서 명확하게 나타난 관계만 추출
    - 소스 엔티티(source)와 타겟 엔티티(target)는 반드시 엔티티 배열에 있는 엔티티여야 함
    - 관계 설명(description)은 두 엔티티 간의 구체적인 관계를 간결하게 설명
    - 관계 강도(strength)는 다음 기준에 따라 결정:
      * 10점: 직접적인 창작/종속 관계 (예: 저자와 작품, 발명가와 발명, 모회사와 자회사)
      * 9점: 동일 엔티티의 다른 표현 형태 (예: 별명, 이전 이름)
      * 8점: 긴밀히 관련되고 서로 영향을 미치는 관계 (예: 긴밀한 협력 파트너, 가족 구성원)
      * 7점: 명확하지만 직접적이지 않은 관계 (예: 작품 속 캐릭터, 조직의 구성원)
      * 6점: 간접적으로 연관되어 있지만 명확한 연결 (예: 동료 관계, 유사 제품)
      * 5점: 연관이 있지만 비교적 느슨함 (예: 같은 분야의 다른 개념)

    ## 추출 단계
    1. 텍스트 내용을 주의 깊게 분석하여 어떤 엔티티 간에 명확한 관계가 있는지 확인
    2. 텍스트에서 명확히 언급된 관계만 고려, 추측 금지
    3. 발견한 각 관계에 대해 다음을 결정:
       - source: 관계의 소스 엔티티 제목 (반드시 엔티티 목록에 있는 엔티티)
       - target: 관계의 타겟 엔티티 제목 (반드시 엔티티 목록에 있는 엔티티)
       - description: 간결하고 정확한 관계 설명 (한국어로 표현)
       - strength: 위 기준에 따른 관계 강도 (5-10 사이의 정수)
    4. 각 관계가 양방향인지 확인:
       - 관계가 양방향이면 ("A는 B의 친구"는 "B도 A의 친구"를 의미) 역방향 관계 생성 고려
       - 관계가 단방향이면 ("A가 B를 창작함") 단방향 관계만 유지
    5. 모든 관계의 일관성과 합리성 검증:
       - 모순된 관계가 없는지 확인 (예: A가 동시에 B의 아버지이면서 형제)
       - 관계 설명과 관계 강도가 일치하는지 확인
    6. 모든 유효한 관계를 JSON 배열로 구성

    ## 예시
    [입력]
    엔티티: [
      {
        "title": "해리 포터",
        "type": "Work",
        "description": "해리 포터는 영국 작가 J.K. 롤링이 쓴 판타지 소설 시리즈입니다"
      },
      {
        "title": "J.K. 롤링",
        "type": "Person",
        "description": "J.K. 롤링은 영국 작가로, 해리 포터 시리즈의 저자입니다"
      },
      {
        "title": "호그와트",
        "type": "Location",
        "description": "호그와트는 해리 포터 시리즈의 배경이 되는 마법학교입니다"
      }
    ]

    텍스트: 《해리 포터》는 영국 작가 J.K. 롤링이 쓴 판타지 소설 시리즈로, 호그와트 마법학교를 배경으로 합니다.

    [출력]
    [
      {
        "source": "J.K. 롤링",
        "target": "해리 포터",
        "description": "J.K. 롤링은 해리 포터 시리즈의 저자입니다",
        "strength": 10
      },
      {
        "source": "해리 포터",
        "target": "호그와트",
        "description": "호그와트는 해리 포터 시리즈의 배경입니다",
        "strength": 7
      }
    ]

  generate_questions_prompt: |
    당신은 전문적인 질문 생성 어시스턴트입니다. 주어진 【주요 내용】을 바탕으로 사용자가 할 수 있는 관련 질문을 생성하는 것이 당신의 임무입니다.

    {{.Context}}
    ## 주요 내용 (이 내용을 바탕으로 질문 생성)
    문서 이름: {{.DocName}}
    문서 내용:
    {{.Content}}

    ## 핵심 요구사항
    - 생성된 질문은 반드시 【주요 내용】과 직접 관련되어야 함
    - 질문에서 대명사나 지시어 사용 금지 ("그것", "이것", "해당 문서", "본문", "문중", "그" 등), 반드시 구체적인 명칭으로 대체
    - 질문은 완전히 독립적이어야 하며, 맥락 없이도 이해 가능해야 함
    - 질문은 사용자가 실제 상황에서 할 수 있는 자연스러운 질문이어야 함
    - 질문은 다양해야 하며, 내용의 다양한 측면을 다루어야 함
    - 각 질문은 간결 명료해야 하며, 30자 이내로 제한
    - 생성할 질문 수: {{.QuestionCount}}개

    ## 질문 유형 제안
    - 정의형: ...이란 무엇인가요? ...은(는) 무엇인가요?
    - 원인형: 왜...인가요? ...의 이유는 무엇인가요?
    - 방법형: 어떻게...하나요? ...하려면 어떻게 하나요?
    - 비교형: ...와(과) ...의 차이점은 무엇인가요?
    - 응용형: ...은(는) 어떤 상황에서 사용할 수 있나요?

    ## 출력 형식
    질문 목록을 직접 출력, 한 줄에 하나의 질문, 번호나 기타 접두사 없이.

# 지식베이스 설정
knowledge_base:
  chunk_size: 512
  chunk_overlap: 50
  split_markers: ["\n\n", "\n", "。"]
  image_processing:
    enable_multimodal: true

extract:
  extract_graph:
    description: |
      주어진 텍스트를 기반으로 다음 단계를 따라 정보 추출 작업을 완료하세요. 논리가 명확하고 정보가 완전하고 정확하도록 보장하세요:

      ## 1. 엔티티 추출 및 속성 보완
      1. **핵심 엔티티 추출**: 텍스트를 통독하고, 논리적 순서(텍스트 서술 순서, 엔티티 연관 긴밀도 등)에 따라 작업과 관련된 모든 핵심 엔티티 추출
      2. **엔티티 상세 속성 보완**: 추출한 각 엔티티에 대해 텍스트에서 명확히 언급된 상세 속성을 전면적으로 보완, 핵심 속성 누락 없이

      ## 2. 관계 추출 및 검증
      1. **관계 유형 명확화**: 지정된 관계 목록에서만 해당 유형 선택, 관계 유형 제한: %s
      2. **유효 관계 추출**: 추출된 엔티티 및 속성을 기반으로 텍스트에 실제로 존재하는 관계 식별, 관계가 텍스트 사실에 부합하고 허위 연관 없이
      3. **관계 주체 명확화**: 추출한 각 관계에 대해 두 연관 주체를 명확히 표시, 주체 혼동 방지
      4. **연관 속성 보완**: 텍스트에 해당 관계와 직접 관련된 보충 정보가 있으면 해당 정보를 관계의 연관 속성으로 보완, 관계 정보 완성도 향상
    tags:
      - "저자"
      - "별명"
    examples:
      - text: |
          《해리 포터》는 영국 작가 J.K. 롤링이 1997년부터 2007년까지 발표한 판타지 소설 시리즈입니다.
          이 시리즈는 전 세계적으로 5억 부 이상 판매되어 역대 베스트셀러 시리즈 중 하나가 되었습니다.
          호그와트 마법학교를 배경으로 해리 포터와 친구들의 모험을 그립니다.
        node:
          - name: "해리 포터"
            attributes:
              - "판타지 소설 시리즈"
              - "전 세계 5억 부 이상 판매"
              - "역대 베스트셀러 시리즈 중 하나"
          - name: "J.K. 롤링"
            attributes:
              - "영국 작가"
              - "해리 포터 시리즈 저자"
          - name: "호그와트"
            attributes:
              - "마법학교"
              - "해리 포터 시리즈의 배경"
        relation:
          - node1: "해리 포터"
            node2: "J.K. 롤링"
            type: "저자"
  extract_entity:
    description: |
      사용자가 제공한 질문을 기반으로 다음 단계에 따라 핵심 정보 추출 작업을 처리하세요:
      1. 논리 관계 정리: 먼저 텍스트 내용을 완전히 분석하고, 핵심 논리 관계를 명확히 하며, 해당 핵심 논리 유형을 간략히 표시
      2. 핵심 엔티티 추출: 정리된 논리 관계를 중심으로 텍스트의 핵심 정보를 정확히 추출하고 명확한 엔티티로 분류, 핵심 정보 누락 없이, 중복 내용 추가 없이
      3. 엔티티 우선순위 정렬: 엔티티와 텍스트 핵심 주제의 연관 긴밀도에 따라 정렬, 텍스트 요지 이해에 가장 중요한 엔티티 우선 제시
    examples:
      - text: "《해리 포터》는 영국 작가 J.K. 롤링이 쓴 판타지 소설 시리즈로, 전 세계적으로 5억 부 이상 판매된 베스트셀러입니다."
        node:
          - name: "해리 포터"
          - name: "J.K. 롤링"
          - name: "판타지 소설"
  fabri_text:
    with_tag: |
      무작위로 텍스트를 생성해 주세요. 내용은 %s 등과 관련되어야 하며, 글자 수는 [50-200] 사이로, 이러한 태그와 관련된 전문 용어나 전형적인 요소를 포함하여 텍스트의 타겟팅과 관련성을 높여 주세요.
    with_no_tag: |
      무작위로 텍스트를 생성해 주세요. 내용은 자유롭게, 글자 수는 [50-200] 사이로 해주세요.

# WebSearch 설정
web_search:
  # 사용 가능한 검색 엔진 목록
  providers:
    - id: "duckduckgo"
      name: "DuckDuckGo"
      free: true
      requires_api_key: false
      description: "DuckDuckGo API"


  # 기본 설정
  default:
    provider: "duckduckgo"
    max_results: 5
    include_date: true
    compression_method: "none"
    blacklist: []

  # 전역 타임아웃 설정
  timeout: 10

# 테넌트 설정
tenant:
  # 교차 테넌트 접근 기능 활성화 여부 (내부 네트워크 환경에서 활성화 가능)
  enable_cross_tenant_access: false
