      enable_query_expansion:
        type: boolean
      enable_rewrite:
        type: boolean
      fallback_prompt:
        type: string
      fallback_response:
        type: string
      fallback_strategy:
        description: Fallback strategy
        type: string
      keyword_threshold:
        type: number
      max_completion_tokens:
