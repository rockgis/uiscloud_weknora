host: localhost:8080
info:
  contact:
    name: WeKnora Github
    url: https://github.com/Tencent/WeKnora
  description: WeKnora 지식베이스 관리 시스템 API 문서
  termsOfService: http://swagger.io/terms/
  title: WeKnora API
  version: "1.0"
paths:
  /api/v1/web-search/providers:
    get:
      consumes:
      - application/json
      description: Returns the list of available web search providers from configuration
      produces:
      - application/json
      responses:
        "200":
          description: List of providers
          schema:
            additionalProperties: true
            type: object
      summary: Get available web search providers
      tags:
      - web-search
  /auth/change-password:
    post:
      consumes:
      - application/json
      description: 현재 사용자의 로그인 비밀번호를 변경합니다
      parameters:
      - description: 비밀번호 변경 요청
        in: body
        name: request
        required: true
        schema:
          properties:
            new_password:
              type: string
            old_password:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 변경 성공
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 잘못된 요청 파라미터
          schema:
            $ref: '#/definitions/github_com_Tencent_WeKnora_internal_errors.AppError'
      security:
      - Bearer: []
      summary: 비밀번호 변경
      tags:
      - 인증
  /auth/login:
    post:
      consumes:
      - application/json
      description: 사용자 로그인 및 액세스 토큰 발급
      parameters:
      - description: 로그인 요청 파라미터
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Tencent_WeKnora_internal_types.LoginResponse'
        "401":
          description: 인증 실패
          schema:
            $ref: '#/definitions/github_com_Tencent_WeKnora_internal_errors.AppError'
      summary: 사용자 로그인
      tags:
      - 인증
  /auth/logout:
    post:
      consumes:
      - application/json
      description: 현재 액세스 토큰을 무효화하고 로그아웃합니다
      produces:
      - application/json
      responses:
        "200":
          description: 로그아웃 성공
          schema:
            additionalProperties: true
