        type: integer
      prompt:
        type: string
      rerank_model_id:
        type: string
      rerank_threshold:
        type: number
      rerank_top_k:
        type: integer
      rewrite_prompt_system:
        description: Rewrite prompts
        type: string
      rewrite_prompt_user:
        type: string
      summary_model_id:
        description: Model configuration
        type: string
      temperature:
        description: Temperature controls the randomness of the model output
        type: number
      use_custom_context_template:
        type: boolean
      use_custom_system_prompt:
        description: Prompt is the system prompt for normal mode
        type: boolean
      vector_threshold:
        type: number
    type: object
